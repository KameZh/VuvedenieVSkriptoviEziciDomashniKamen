<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Posts</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:900px;margin:24px auto;padding:0 16px}
    .post{border-bottom:1px solid #ddd;padding:12px 0}
    .post h2{margin:0 0 6px;font-size:20px}
    .meta{color:#666;font-size:13px}
    .content{margin-top:8px}
  </style>
</head>
<body>
  <h1>Posts</h1>
  {% if posts %}
    {% for post in posts %}
      <article class="post">
        <h2>{{ post.title }}</h2>
        <div class="meta">{{ post.date }}{% if post.description %} — {{ post.description }}{% endif %}</div>
        <div class="content">{{ post.content|linebreaks }}</div>
      </article>
    {% endfor %}
  {% else %}
    <p>No posts yet.</p>
  {% endif %}
</body>
</html>
